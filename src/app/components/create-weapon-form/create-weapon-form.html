<mat-card class="page-card form-card">
  <mat-card-header>
    <mat-card-title>Create New Weapon</mat-card-title>
    <mat-card-subtitle>Forge a stronger loadout for your heroes.</mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <div class="form-grid">
      <mat-form-field>
        <mat-label>Weapon name</mat-label>
        <input matInput placeholder="Enter weapon name" [formControl]="nameControl" />
      </mat-form-field>

      <mat-form-field>
        <mat-label>Damage</mat-label>
        <input matInput type="number" placeholder="Enter weapon damage" [formControl]="damageControl" />
      </mat-form-field>
    </div>
  </mat-card-content>

  <mat-card-actions class="actions-row">
    <button mat-flat-button color="primary" type="button" (click)="createWeapon()">Create weapon</button>
  </mat-card-actions>

  @if (message()) {
    <div class="message">
      {{ message() }}
    </div>
  }
</mat-card>
